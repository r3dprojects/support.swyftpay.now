name: Feature Request
description: Suggest an improvement or new capability for swyftpay.now
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. We read every request — though we cannot commit to timelines or guarantee every request will be implemented.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation. What are you trying to do that is hard or impossible today?
      placeholder: "As a merchant, I need to..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Your proposed solution
      description: What would you like to see? Be as specific as you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you have considered
      description: Have you found any workarounds? Are there other approaches that would also solve the problem?

  - type: checkboxes
    id: preflight
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this has not already been requested
          required: true
